<!DOCTYPE html>
<html>
<head>
    <title>STUDENT EVALUATION SYSTEM</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to right, #e6ebf1, #cfd8e3);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .login-box h1 {
            margin-bottom: 10px;
            color: #1d2671;
        }

        .login-box h3 {
            margin-bottom: 25px;
            color: #555;
            font-weight: normal;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .login-box input[type="submit"] {
            background-color: #1d2671;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .login-box input[type="submit"]:hover {
            background-color: #162057;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .footer-text {
            margin-top: 15px;
            font-size: 13px;
            color: #777;
        }
    </style>

</head>
<body>

    <div class="login-box">
        <h1>STUDENT EVALUATION SYSTEM</h1>
        <h3>Login</h3>

        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="submit" value="Login">
        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <div class="footer-text">
            Academic Project – BCA
        </div>
    </div>

</body>
</html>
