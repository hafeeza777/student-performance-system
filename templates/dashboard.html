<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #e6ebf1;
}

.container {
    width: 900px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 15px #f48fb1;
}

h2 {
    color: #c2185b;
    text-align: center;
}

.summary {
    display: flex;
    justify-content: space-between;
    margin-top: 25px;
}

.card {
    width: 30%;
    background: #fce4ec;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.buttons {
    text-align: center;
    margin-top: 30px;
}

button {
    padding: 10px 18px;
    margin: 5px;
    border: none;
    background: #c2185b;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #ad1457;
}

#summaryBox {
    display: none;
    margin-top: 25px;
    padding: 18px;
    background: #f3e5f5;
    border-radius: 10px;
}

.next-btn {
    margin-top: 30px;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 STUDENT PERFORMANCE DASHBOARD📊</h2>

<div class="summary">
    <div class="card">
        <h3>Student Name</h3>
        <p>{{ name }}</p>
    </div>

    <div class="card">
        <h3>Total Marks</h3>
        <p>{{ total }} / 500</p>
    </div>

    <div class="card">
        <h3>Status</h3>
        <p>{{ result }}</p>
    </div>
</div>

<div class="buttons">
    <button onclick="showBar()">Bar Chart</button>
    <button onclick="showPie()">Pie Chart</button>
    <button onclick="showLine()">Line Chart</button>
    <button onclick="showSummary()">Student Performance Summary</button>
</div>

<canvas id="chartCanvas"></canvas>

<div id="summaryBox">
    <h3 style="text-align:center;">Student Performance Summary</h3>
    <p style="text-align:center;">
        {{ name }} scored <b>{{ total }}</b> marks with
        <b>{{ percentage }}%</b>.
    </p>
    <p style="text-align:center;">
        Highest: <b>{{ maximum }}</b> |
        Lowest: <b>{{ minimum }}</b>
    </p>
</div>

<div class="next-btn">
    <a href="{{ url_for('download_certificate') }}">
        <button>Download Certificate 🎓</button>
    </a>
</div>

</div>

<script>
window.onload = function() {

const labels = {{ subjects | tojson }};
const marks = {{ marks | tojson }};
const maxMarks = new Array(labels.length).fill(100);

let chart = null;
const canvas = document.getElementById("chartCanvas");
const summary = document.getElementById("summaryBox");

function clearAll() {
    if (chart) {
        chart.destroy();
        chart = null;
    }
    canvas.style.display = "none";
    summary.style.display = "none";
}

window.showSummary = function() {
    clearAll();
    summary.style.display = "block";
};

window.showBar = function() {
    clearAll();
    canvas.style.display = "block";

    chart = new Chart(canvas, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [
    {
        label: "Student Marks",
        data: marks,
        backgroundColor: "#c2185b",   // ← your bar color
        borderColor: "#880e4f",
        borderWidth: 1
    },
    {
        label: "Max Marks",
        data: maxMarks,
        backgroundColor: "#90caf9",
        borderColor: "#1565c0",
        borderWidth: 1
    }
]        },
        options: { scales: { y: { beginAtZero: true, max: 100 } } }
    });
};

window.showPie = function() {
    clearAll();
    canvas.style.display = "block";

    chart = new Chart(canvas, {
        type: "pie",
        data: {
            labels: labels,
            datasets: [{ data: marks }]
        }
    });
};

window.showLine = function() {
    clearAll();
    canvas.style.display = "block";

    chart = new Chart(canvas, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Marks",
                data: marks,
                fill: false
            }]
        },
        options: { scales: { y: { beginAtZero: true, max: 100 } } }
    });
};

showBar();
};
</script>

</body>
</html>
